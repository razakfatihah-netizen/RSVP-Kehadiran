<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
        }

        .rsvp-button {
            background: linear-gradient(135deg, #d4567a
 0%, #ff8fab
 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 86, 122, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
        }

        .rsvp-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(212, 86, 122, 0.6);
        }

        .rsvp-button:active {
            transform: translateY(0);
        }

        /* POPUP IFRAME */
        #popupFrame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 99999;
        }

        #popupFrame.active {
            display: block;
        }
    </style>
</head>
<body>

    <button class="rsvp-button" onclick="openPopup()">
        📝 RSVP & Ucapan
    </button>

    <iframe id="popupFrame" src=""></iframe>

    <script>
        const POPUP_URL = 'https://razakfatihah-netizen.github.io/RSVP-Kehadiran/popup-rsvp.html';

        function openPopup() {
            const iframe = document.getElementById('popupFrame');
            iframe.src = POPUP_URL;
            iframe.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePopup() {
            const iframe = document.getElementById('popupFrame');
            iframe.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        // Listen for close message from popup
        window.addEventListener('message', function(event) {
            if (event.data === 'closePopup') {
                closePopup();
            }
        });
    </script>

</body>
<button class="close-btn" onclick="window.history.back()">
    ← Kembali ke Wedding Card
</button>

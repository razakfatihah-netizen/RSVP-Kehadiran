<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ucapan & Doa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #ffeef8
 0%, #fff5e6
 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
    }

    .header h1 {
      font-size: 2.5em;
      color: #d4567d
;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .header p {
      font-size: 1.1em;
      color: #8b6f47
;
      font-style: italic;
    }

    #wishesContainer {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .wish-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(212, 86, 125, 0.15);
      border-left: 5px solid #d4567d
;
      animation: slideIn 0.5s ease-out;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .wish-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(212, 86, 125, 0.25);
    }

    .wish-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .wish-icon {
      font-size: 2em;
      animation: bounce 2s infinite;
    }

    .wish-name {
      font-size: 1.3em;
      font-weight: bold;
      color: #d4567d
;
    }

    .wish-message {
      font-size: 1.1em;
      line-height: 1.6;
      color: #555;
      padding-left: 45px;
    }

    .loading {
      text-align: center;
      font-size: 1.2em;
      color: #d4567d
;
      padding: 40px;
      animation: pulse 1.5s infinite;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2em; }
      .wish-card { padding: 20px; }
      .wish-message { padding-left: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌸 Ucapan & Doa 🌸</h1>
    <p>Terima kasih atas ucapan dan doa yang ikhlas</p>
  </div>

  <div id="wishesContainer">
    <div class="loading">Memuatkan ucapan... 🌸</div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwrbNyA2eSThXM7BPAwLyO9drhWtEO909E7Ie1K1IllfTkzV_esX17q1Zl9eapD7UO-Rg/exec';
    const MAX_WISHES = 8;
    const REFRESH_INTERVAL = 10000;
    const GARDEN_ICONS = ['🌸', '🌺', '🌼', '🌻', '🌷', '🌹', '💐', '🌿', '🍃', '🦋'];

    function getRandomIcon() {
      return GARDEN_ICONS[Math.floor(Math.random() * GARDEN_ICONS.length)];
    }

    function loadWishes() {
      const callbackName = 'handleWishes_' + Date.now();
      
      window[callbackName] = function(wishes) {
        const latestWishes = wishes.reverse().slice(0, MAX_WISHES);
        displayWishes(latestWishes);
        delete window[callbackName];
      };
      
      const script = document.createElement('script');
      script.src = API_URL + '?callback=' + callbackName;
      script.onerror = function() {
        document.getElementById('wishesContainer').innerHTML = 
          '<div class="loading">Tidak dapat memuatkan ucapan. Cuba refresh halaman. 🌸</div>';
      };
      document.body.appendChild(script);
    }

    function displayWishes(wishes) {
      const container = document.getElementById('wishesContainer');
      
      if (wishes.length === 0) {
        container.innerHTML = '<div class="loading">Belum ada ucapan. Jadilah yang pertama! 🌸</div>';
        return;
      }
      
      container.innerHTML = '';
      
      wishes.forEach((wish, index) => {
        const card = document.createElement('div');
        card.className = 'wish-card';
        card.style.animationDelay = (index * 0.1) + 's';
        card.innerHTML = `
          <div class="wish-header">
            <span class="wish-icon">${getRandomIcon()}</span>
            <div class="wish-name">${escapeHtml(wish.name)}</div>
          </div>
          <div class="wish-message">${escapeHtml(wish.message)}</div>
        `;
        container.appendChild(card);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadWishes();
    setInterval(loadWishes, REFRESH_INTERVAL);
  </script>
</body>
</html>
